<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Booking</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="/">Salon Booking</a>
        <a class="nav-link" href="/admin">Admin</a>
    </header>

    <main class="page">
        <section class="hero">
            <div>
                <p class="eyebrow">Simple salon appointments</p>
                <h1>Book your salon visit in minutes.</h1>
                <p class="hero-copy">
                    Choose a service, pick a time slot, and receive a booking confirmation instantly.
                </p>
            </div>

            <form id="bookingForm" class="booking-panel">
                <h2>Book Appointment</h2>

                <label for="name">Customer name</label>
                <input type="text" id="name" placeholder="Enter full name" required>

                <label for="phone">WhatsApp phone number</label>
                <input type="tel" id="phone" placeholder="+919876543210" required>

                <label for="age">Age</label>
                <input type="number" id="age" min="1" max="120" placeholder="Enter age" required>

                <label for="service">Service</label>
                <select id="service" required>
                    {% for service in services %}
                    <option value="{{ service.name }}">{{ service.name }} - Rs. {{ service.price }}</option>
                    {% endfor %}
                </select>

                <label for="appointmentDate">Date</label>
                <input type="date" id="appointmentDate" required>

                <label for="slot">Time slot</label>
                <select id="slot" required>
                    {% for time_slot in time_slots %}
                    <option value="{{ time_slot.slot }}">{{ time_slot.slot }}</option>
                    {% endfor %}
                </select>

                <button type="submit">Book Appointment</button>
                <div id="message" class="message" aria-live="polite"></div>
            </form>
        </section>

        <section class="section">
            <div class="section-heading">
                <p class="eyebrow">Our services</p>
                <h2>Popular salon services</h2>
            </div>

            <div class="services-grid">
                {% for service in services %}
                <button class="service-card" type="button" data-service="{{ service.name }}">
                    <span>{{ service.name }}</span>
                    <strong>Rs. {{ service.price }}</strong>
                    <small>{{ service.duration }}</small>
                </button>
                {% endfor %}
            </div>
        </section>
    </main>

    <script src="/static/script.js?v=2"></script>
</body>
</html>
